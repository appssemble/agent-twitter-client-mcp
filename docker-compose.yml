version: "3.8"

services:
  agent-twitter-client-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-twitter-client-mcp
    restart: unless-stopped
    ports:
      - "${MCP_HOST_PORT:-3000}:${MCP_CONTAINER_PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${MCP_CONTAINER_PORT:-3000}
      # Serve MCP over Streamable HTTP at /mcp (set to "stdio" for stdio transport)
      - MCP_TRANSPORT=http
      # Optional bearer token protecting the /mcp endpoint
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      # Twitter authentication - set these in a .env file or through environment variables
      - AUTH_METHOD=${AUTH_METHOD:-cookies}
      - TWITTER_COOKIES=${TWITTER_COOKIES:-[]}
      # For username/password auth
      - TWITTER_USERNAME=${TWITTER_USERNAME:-}
      - TWITTER_PASSWORD=${TWITTER_PASSWORD:-}
      - TWITTER_EMAIL=${TWITTER_EMAIL:-}
      - TWITTER_2FA_SECRET=${TWITTER_2FA_SECRET:-}
      # For API auth
      - TWITTER_API_KEY=${TWITTER_API_KEY:-}
      - TWITTER_API_SECRET_KEY=${TWITTER_API_SECRET_KEY:-}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN:-}
      - TWITTER_ACCESS_TOKEN_SECRET=${TWITTER_ACCESS_TOKEN_SECRET:-}
    volumes:
      - ./logs:/app/logs
    networks:
      - twitter-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:'+(process.env.PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  twitter-network:
    driver: bridge
